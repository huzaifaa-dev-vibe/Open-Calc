// Top-level build file — OpenCalc Android (Capacitor)
buildscript {
    ext {
        kotlinVersion = "1.9.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.9.1"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "app.opencalc"
    compileSdkVersion 36

    defaultConfig {
        applicationId "app.opencalc"
        minSdkVersion 24          // Android 7.0 — covers ~99% of active devices
        targetSdkVersion 36       // Android 16
        versionCode 1
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    // Signing config — populated from environment variables in CI.
    // Locally you can also define these in ~/.gradle/gradle.properties
    // or pass them on the command line. NEVER commit keystore passwords.
    signingConfigs {
        release {
            if (project.hasProperty("RELEASE_STORE_FILE")) {
                storeFile file(RELEASE_STORE_FILE)
                storePassword RELEASE_STORE_PASSWORD
                keyAlias RELEASE_KEY_ALIAS
                keyPassword RELEASE_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
        debug {
            minifyEnabled false
            debuggable true
        }
    }

    androidResources {
        noCompress ""
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation "androidx.core:core-splashscreen:1.0.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "com.google.android.material:material:1.12.0"
    // Capacitor core — the bridge that hosts the WebView.
    // The :capacitor-android subproject is declared in capacitor.settings.gradle
    // (auto-generated by `npx cap sync android`). Capacitor plugins like
    // :capacitor-preferences are added by capacitor.build.gradle.
    implementation project(':capacitor-android')
}

// Apply Capacitor's auto-generated build config (created by `npx cap sync android`).
// This file lives at android/app/capacitor.build.gradle and adds the
// project dependencies on any installed plugins (e.g. @capacitor/preferences).
try {
    apply from: "capacitor.build.gradle"
} catch (Exception e) {
    println "WARNING: capacitor.build.gradle not found. Run 'npx cap sync android' first."
}
