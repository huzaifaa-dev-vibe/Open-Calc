<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f6e54"/>
      <stop offset="100%" stop-color="#0a4d3c"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#e0941a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <g fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <!-- Calculator body -->
    <rect x="120" y="100" width="272" height="312" rx="32" stroke-opacity="0.95"/>
    <!-- Display -->
    <rect x="148" y="132" width="216" height="64" rx="14" fill="#ffffff" stroke="none" fill-opacity="0.15"/>
    <!-- Keys grid -->
    <g stroke-width="20">
      <line x1="172" y1="240" x2="172" y2="240.01"/>
      <line x1="240" y1="240" x2="240" y2="240.01"/>
      <line x1="308" y1="240" x2="308" y2="240.01"/>
      <line x1="172" y1="304" x2="172" y2="304.01"/>
      <line x1="240" y1="304" x2="240" y2="304.01"/>
      <line x1="308" y1="304" x2="308" y2="304.01"/>
      <line x1="172" y1="368" x2="172" y2="368.01"/>
      <line x1="240" y1="368" x2="240" y2="368.01"/>
    </g>
  </g>
  <!-- Equals key accent -->
  <rect x="288" y="346" width="56" height="44" rx="12" fill="url(#acc)"/>
  <line x1="298" y1="362" x2="334" y2="362" stroke="#0a4d3c" stroke-width="6" stroke-linecap="round"/>
  <line x1="298" y1="374" x2="334" y2="374" stroke="#0a4d3c" stroke-width="6" stroke-linecap="round"/>
</svg>
