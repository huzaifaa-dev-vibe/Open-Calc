name: Build & Release APK

# Builds the OpenCalc Android APK whenever a tag like v1.0.0 is pushed.
# The APK is signed with the keystore stored in repository secrets
# (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD) and
# attached to a GitHub Release.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64    — base64-encoded opencalc-release.keystore
#   KEYSTORE_PASSWORD  — keystore password (also used as key password)
#   KEY_ALIAS          — key alias (e.g. "opencalc")
#   KEY_PASSWORD       — key password (same as KEYSTORE_PASSWORD for PKCS12)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔨 Build Next.js (static export for Android)
        run: bun run build:android
        env:
          BUILD_TARGET: android
          NODE_ENV: production

      - name: 📲 Sync Capacitor (copy web assets to android/)
        run: |
          # Remove the manually-created android/ folder so Capacitor can
          # generate a proper one from scratch. We keep our custom files
          # (manifest, icons, build.gradle overrides) by restoring them
          # after `cap add`.
          rm -rf android
          npx cap add android || npx cap sync android
          # Re-apply our custom AndroidManifest.xml (with min permissions),
          # build.gradle, proguard rules, icons, and resources from the repo
          # (cap sync preserves these if they exist, but cap add overwrites)
        continue-on-error: true

      - name: 🔧 Ensure gradle wrapper is present
        run: |
          # The wrapper files (gradlew, gradlew.bat, gradle-wrapper.jar)
          # are committed to the repo, but cap add may have overwritten
          # them. Restore from git if missing.
          cd android
          if [ ! -f ./gradlew ]; then
            git checkout HEAD -- android/gradlew android/gradlew.bat android/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
            # If that fails (because cap add deleted them), download fresh
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradlew" -o gradlew
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradlew.bat" -o gradlew.bat
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
            chmod +x gradlew
          fi
          ls -la gradlew gradle/wrapper/gradle-wrapper.jar

      - name: 📋 Restore custom Android files from repo
        run: |
          # Re-apply our custom manifest (with minimal permissions),
          # build.gradle (with signing config), and resources
          git checkout HEAD -- android/app/src/main/AndroidManifest.xml
          git checkout HEAD -- android/app/build.gradle
          git checkout HEAD -- android/app/proguard-rules.pro
          git checkout HEAD -- android/app/src/main/res/values/strings.xml
          git checkout HEAD -- android/app/src/main/res/values/colors.xml
          git checkout HEAD -- android/app/src/main/res/values/styles.xml
          git checkout HEAD -- android/app/src/main/res/xml/network_security_config.xml
          git checkout HEAD -- android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          git checkout HEAD -- android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          git checkout HEAD -- android/app/src/main/java/app/opencalc/MainActivity.java
          # Restore icons (all density buckets)
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            git checkout HEAD -- android/app/src/main/res/mipmap-${d}/ 2>/dev/null || true
          done
          # Now sync again to copy web assets + apply our config
          npx cap sync android

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: 🔑 Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $HOME/opencalc-release.keystore
          echo "Keystore size: $(wc -c < $HOME/opencalc-release.keystore) bytes"

      - name: 🏗️ Build signed release APK
        working-directory: android
        run: |
          chmod +x ./gradlew || true
          ./gradlew assembleRelease --no-daemon \
            -PRELEASE_STORE_FILE=$HOME/opencalc-release.keystore \
            -PRELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PRELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PRELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: 📦 Locate and rename APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK at: $APK_PATH"
          TAG=${GITHUB_REF_NAME:-v1.0.0}
          cp "$APK_PATH" "OpenCalc-${TAG}.apk"
          echo "path=OpenCalc-${TAG}.apk" >> $GITHUB_OUTPUT

      - name: 🔐 Generate SHA256 checksum
        run: |
          sha256sum "${{ steps.apk.outputs.path }}" > "${{ steps.apk.outputs.path }}.sha256"
          echo "Checksum:"
          cat "${{ steps.apk.outputs.path }}.sha256"

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencalc-apk
          path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.path }}.sha256
          retention-days: 90

      - name: 🚀 Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: scripts/release/v1.0.0-release-notes.md
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.path }}.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧹 Cleanup keystore
        if: always()
        run: rm -f $HOME/opencalc-release.keystore
