name: Build & Release APK

# Builds the OpenCalc Android APK whenever a tag like v1.0.0 is pushed.
# The APK is signed with the keystore stored in repository secrets
# (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD) and
# attached to a GitHub Release.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64    — base64-encoded opencalc-release.keystore
#   KEYSTORE_PASSWORD  — keystore password (also used as key password)
#   KEY_ALIAS          — key alias (e.g. "opencalc")
#   KEY_PASSWORD       — key password (same as KEYSTORE_PASSWORD for PKCS12)
#
# To create the base64 string locally:
#   base64 opencalc-release.keystore | tr -d '\n'

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0)"
        required: false

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔨 Build Next.js (production)
        run: bun run build
        env:
          NODE_ENV: production

      - name: 📲 Sync Capacitor (copy web assets to android/)
        run: |
          # Capacitor sync requires the CLI to be installed locally
          npx cap sync android

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: 🔑 Decode signing keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $HOME/opencalc-release.keystore
          echo "RELEASE_STORE_FILE=$HOME/opencalc-release.keystore" >> $GITHUB_ENV
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: 🏗️ Build signed release APK
        working-directory: android
        run: |
          chmod +x ./gradlew || true
          ./gradlew assembleRelease --no-daemon -PRELEASE_STORE_FILE=$RELEASE_STORE_FILE -PRELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD -PRELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS -PRELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD

      - name: 📦 Locate built APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          # Copy to a predictable filename
          TAG=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}
          TAG=${TAG:-v1.0.0}
          cp "$APK_PATH" "OpenCalc-${TAG}.apk"
          echo "name=OpenCalc-${TAG}.apk" >> $GITHUB_OUTPUT

      - name: 🔐 Generate SHA256 checksum
        run: |
          sha256sum "${{ steps.apk.outputs.name }}" > "${{ steps.apk.outputs.name }}.sha256"
          echo "Checksum:"
          cat "${{ steps.apk.outputs.name }}.sha256"

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencalc-apk
          path: |
            ${{ steps.apk.outputs.name }}
            ${{ steps.apk.outputs.name }}.sha256
          retention-days: 90

      - name: 🚀 Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.apk.outputs.name }}
            ${{ steps.apk.outputs.name }}.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧹 Cleanup keystore
        if: always()
        run: |
          rm -f $HOME/opencalc-release.keystore
          rm -f ${{ steps.apk.outputs.name }} ${{ steps.apk.outputs.name }}.sha256
